<?xml version="1.0" encoding="UTF-8"?>
<svg width="750" height="1624" viewBox="0 0 750 1624" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="750" y2="1624" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102033"/>
      <stop offset="0.45" stop-color="#17314A"/>
      <stop offset="1" stop-color="#2B5C7A"/>
    </linearGradient>
    <linearGradient id="goldBtn" x1="0" y1="0" x2="0" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE4A0"/>
      <stop offset="1" stop-color="#F4C56A"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#09111D" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="750" height="1624" fill="url(#bg)"/>
  <rect x="24" y="24" width="702" height="1576" rx="36" stroke="rgba(255,255,255,0.18)"/>
  <text x="375" y="86" fill="#FFFFFF" font-size="34" font-weight="700" text-anchor="middle">挑战失败</text>
  <text x="375" y="126" fill="rgba(255,255,255,0.72)" font-size="20" text-anchor="middle">结算页承接 V0 文字战斗失败复盘，保留重试与回流章节的清晰出口</text>

  <rect x="66" y="204" width="618" height="1160" rx="40" fill="#FFF8EE" stroke="#D7C5AA" stroke-width="2"/>
  <circle cx="375" cy="372" r="88" fill="#D96B6B" opacity="0.14" stroke="#D96B6B" stroke-width="3"/>
  <text x="375" y="394" fill="#D96B6B" font-size="56" font-weight="700" text-anchor="middle">失败</text>
  <text x="375" y="494" fill="#1F2937" font-size="42" font-weight="700" text-anchor="middle">挑战失败</text>
  <text x="375" y="540" fill="#667085" font-size="24" text-anchor="middle">止步于第4层第2波，可返回继续养成</text>
  <text x="375" y="578" fill="#667085" font-size="20" text-anchor="middle">V0 先以文字复盘帮助前端验证失败回流、再试一次与建议提示</text>

  <rect x="110" y="642" width="530" height="246" rx="28" fill="#F4ECE0" stroke="#D7C5AA" stroke-width="2"/>
  <text x="142" y="700" fill="#1F2937" font-size="28" font-weight="700">本局战报摘要</text>
  <text x="142" y="754" fill="#667085" font-size="22">[回合 11] 鸡王暴击，造成 38 点伤害</text>
  <text x="142" y="800" fill="#667085" font-size="22">[回合 12] 金钟罩进入冷却，我方生命快速见底</text>
  <text x="142" y="846" fill="#667085" font-size="22">[回合 13] 我方倒下，战斗结束并进入失败结算</text>

  <rect x="110" y="912" width="530" height="186" rx="28" fill="#F8F2E8" stroke="#D7C5AA" stroke-width="2"/>
  <text x="142" y="970" fill="#1F2937" font-size="28" font-weight="700">失败复盘</text>
  <text x="142" y="1024" fill="#667085" font-size="24">铜钱 +36</text>
  <text x="142" y="1068" fill="#667085" font-size="24">功法经验 +6</text>
  <text x="142" y="1112" fill="#667085" font-size="24">建议提升：生命向功法优先</text>

  <g filter="url(#shadow)">
    <rect x="110" y="1140" width="530" height="88" rx="22" fill="url(#goldBtn)" stroke="#B78832" stroke-width="2"/>
  </g>
  <text x="375" y="1194" fill="#1F2937" font-size="28" font-weight="700" text-anchor="middle">再试一次</text>

  <g filter="url(#shadow)">
    <rect x="110" y="1244" width="530" height="72" rx="22" fill="#FFF8EE" stroke="#D7C5AA" stroke-width="2"/>
  </g>
  <text x="375" y="1290" fill="#1F2937" font-size="28" font-weight="700" text-anchor="middle">返回章节</text>
